name: CI

# Tests, typechecks and drift-checks every push to main and every pull request:
# the .NET suites, the web and MCP suites, and a guard that the generated rule
# files still match rules/guardrails.json.
#
# The deploy workflows build but never test, so this is the only place the suites
# actually run. It does not gate anything — main is deliberately unprotected, so a
# red run reports rather than blocks. Read the result and follow up.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET tests (backend + agent)
    # windows-latest is required: the agent test projects target net48.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AutopilotMonitor.sln

      - name: Build
        run: dotnet build AutopilotMonitor.sln --configuration Release --no-restore

      - name: Backend tests
        run: dotnet test src/Backend/AutopilotMonitor.Functions.Tests --configuration Release --no-build --verbosity quiet

      - name: Agent V2 Core tests
        run: dotnet test src/Agent/AutopilotMonitor.Agent.V2.Core.Tests --configuration Release --no-build --verbosity quiet

      - name: Decision Core tests
        run: dotnet test src/Agent/AutopilotMonitor.DecisionCore.Tests --configuration Release --no-build --verbosity quiet

      - name: Summary Dialog tests
        run: dotnet test src/Agent/AutopilotMonitor.SummaryDialog.Tests --configuration Release --no-build --verbosity quiet

  web:
    name: Web (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web/autopilot-monitor-web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/Web/autopilot-monitor-web/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  mcp:
    name: MCP server tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/McpServer/autopilot-monitor-mcp
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/McpServer/autopilot-monitor-mcp/package-lock.json

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  guardrails-in-sync:
    name: Generated guardrails match rules/guardrails.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Regenerate
        run: node rules/scripts/combine.js

      - name: Fail if the generated files drifted
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated files are out of date. Run 'node rules/scripts/combine.js' and commit the result."
            git diff --stat
            exit 1
          fi
