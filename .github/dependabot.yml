version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dotnet:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /src/Web/autopilot-monitor-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ['*']
        update-types: [minor, patch]
    # Major bumps are breaking and reviewed deliberately, not auto-PR'd.
    # Security updates ignore this filter, so the Security tab stays clean.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /src/McpServer/autopilot-monitor-mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mcp:
        patterns: ['*']
        update-types: [minor, patch]
    # Major bumps are breaking and reviewed deliberately, not auto-PR'd.
    # Security updates ignore this filter, so the Security tab stays clean.
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
