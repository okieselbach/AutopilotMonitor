version: 2

updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dotnet:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /src/Web/autopilot-monitor-web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      web:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /src/McpServer/autopilot-monitor-mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      mcp:
        patterns: ['*']
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
